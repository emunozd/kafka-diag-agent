# ================================================================
# kafka-diag-agent — application properties
# All sensitive values come from environment variables injected
# from OCP Secrets via the Helm chart.
# ================================================================

quarkus.application.name=kafka-diag-agent

# ----------------------------------------------------------------
# LLM — OpenAI-compatible endpoint (local Qwen3 or external provider)
# ----------------------------------------------------------------
quarkus.langchain4j.openai.base-url=${LLM_BASE_URL:http://qwen3-8b-llm-predictor.kafka-diag-agent.svc.cluster.local:8000/v1}
quarkus.langchain4j.openai.api-key=${LLM_API_KEY:none}
quarkus.langchain4j.openai.timeout=120s
quarkus.langchain4j.openai.log-requests=false
quarkus.langchain4j.openai.log-responses=false

quarkus.langchain4j.openai.chat-model.model-name=${LLM_MODEL_NAME:/mnt/models}
quarkus.langchain4j.openai.chat-model.max-tokens=${LLM_MAX_TOKENS:768}
quarkus.langchain4j.openai.chat-model.temperature=${LLM_TEMPERATURE:0.1}

# ----------------------------------------------------------------
# Embeddings — nomic-embed via vLLM CPU InferenceService
# ----------------------------------------------------------------
kafka.diag.embed.base-url=${EMBED_BASE_URL:http://nomic-embed-svc.kafka-diag-agent.svc.cluster.local:8000/v1}
kafka.diag.embed.model-name=${EMBED_MODEL_NAME:/mnt/models}

# ----------------------------------------------------------------
# ChromaDB — vector store (API v2)
# ----------------------------------------------------------------
kafka.diag.chroma.base-url=${CHROMA_BASE_URL:http://chromadb.kafka-diag-agent.svc.cluster.local:8000}
kafka.diag.chroma.collection=kafka-knowledge
kafka.diag.chroma.top-k=4

# ----------------------------------------------------------------
# PDF knowledge base
# ----------------------------------------------------------------
kafka.diag.pdf.base-path=${PDF_BASE_PATH:/pdfdata}
#kafka.diag.pdf.watcher.interval=60s

# ----------------------------------------------------------------
# KCS — Red Hat Knowledge Base (optional)
# If token is empty, fallback mode returns a search URL
# ----------------------------------------------------------------
#kafka.diag.kcs.offline-token=${RH_OFFLINE_TOKEN:none}
kafka.diag.kcs.offline-token=${RH_OFFLINE_TOKEN:disabled}
kafka.diag.kcs.search-url=https://access.redhat.com/search/#/?q={query}&documentKind=Solution

# ----------------------------------------------------------------
# Default namespace — injected by the pod via fieldRef
# ----------------------------------------------------------------
kafka.diag.default-namespace=${APP_NAMESPACE:kafka-diag-agent}

# ----------------------------------------------------------------
# HTTP server
# ----------------------------------------------------------------
quarkus.http.port=8080
quarkus.http.cors=true
quarkus.http.cors.origins=*

# ----------------------------------------------------------------
# Health UI
# ----------------------------------------------------------------
quarkus.smallrye-health.ui.enable=true

# ----------------------------------------------------------------
# Dev mode overrides
# ----------------------------------------------------------------
%dev.quarkus.langchain4j.openai.base-url=http://localhost:8000/v1
%dev.quarkus.langchain4j.openai.api-key=none
%dev.quarkus.langchain4j.openai.chat-model.model-name=/mnt/models
%dev.kafka.diag.embed.base-url=http://localhost:8001/v1
%dev.kafka.diag.chroma.base-url=http://localhost:8002
%dev.kafka.diag.pdf.base-path=./test-pdfs
%dev.kafka.diag.default-namespace=default
