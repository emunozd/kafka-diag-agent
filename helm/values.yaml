# ==============================================================
# kafka-diag-agent — default values
# Mode: local GPU on OCP with RHOAI 3.3
#
# For external LLM mode (Claude/OpenAI/etc):
#   helm install kafka-diag ./helm/ -f values-external-llm.yaml
# ==============================================================

namespace: kafka-diag-agent

# ---------------------------------------------------------------
# LLM — controls whether local models are deployed on OCP
# or the app connects to an external LLM provider
# ---------------------------------------------------------------
llm:
  # true  = deploys GPU InferenceService + CPU embeddings on OCP
  # false = deploys only the Quarkus app, points to external LLM
  local: true

  # GPU configuration (applies only when local: true)
  gpu:
    image: registry.redhat.io/rhaiis/vllm-cuda-rhel9:3.3.0
    model: hf://RedHatAI/Qwen3-8B-FP8-dynamic
    memoryUtilization: "0.70"
    maxModelLen: "4096"
    maxNumSeqs: "4"
    memoryLimit: 14Gi
    memoryRequest: 12Gi

  # CPU embeddings configuration (applies only when local: true)
  embed:
    image: registry.redhat.io/rhaiis/vllm-cpu-rhel9:3.3.0
    model: hf://RedHatAI/nomic-embed-text-v1.5
    cpuLimit: "4"
    cpuRequest: "2"
    memoryLimit: 4Gi
    memoryRequest: 2Gi

  # External LLM configuration (applies only when local: false)
  external:
    baseUrl: ""       # e.g. https://api.anthropic.com/v1
    apiKey: ""        # NEVER set here — use --set or a separate secret
    modelName: ""     # e.g. claude-sonnet-4-6

# ---------------------------------------------------------------
# HuggingFace token (required when llm.local: true)
# ---------------------------------------------------------------
huggingface:
  token: ""           # NEVER set here — use --set or a separate secret

# ---------------------------------------------------------------
# Red Hat KCS API token (completely optional)
# If not configured, the agent uses fallback mode (search URL)
# ---------------------------------------------------------------
kcs:
  offlineToken: ""    # NEVER set here — use --set or a separate secret

# ---------------------------------------------------------------
# Quarkus application
# ---------------------------------------------------------------
app:
  image: image-registry.openshift-image-registry.svc:5000/kafka-diag-agent/kafka-diag-agent:latest
  replicas: 1
  port: 8080
  buildConfig:
    enabled: true
    gitRepo: https://github.com/emunozd/kafka-diag-agent
    gitRef: main
    contextDir: quarkus

# ---------------------------------------------------------------
# Storage
# ---------------------------------------------------------------
storage:
  storageClass: crc-csi-hostpath-provisioner
  pdfSize: 5Gi
  vectorStoreSize: 2Gi

# ---------------------------------------------------------------
# ChromaDB
# ---------------------------------------------------------------
chromadb:
  image: chromadb/chroma:latest
  memoryLimit: 1Gi
  memoryRequest: 512Mi
  cpuLimit: "1"
  cpuRequest: "500m"
