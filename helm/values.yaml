# ============================================================
# kafka-diag-agent — valores por defecto
# Modo: GPU local en OCP con RHOAI 3.3
#
# Para modo externo (Claude/OpenAI/etc):
#   helm install kafka-diag ./helm/ -f values-external-llm.yaml
# ============================================================

namespace: kafka-diag-agent

# ---------------------------------------------------------------
# LLM — controla si despliega modelos locales en OCP o usa externo
# ---------------------------------------------------------------
llm:
  # true  = despliega InferenceService GPU + embeddings CPU en OCP
  # false = solo despliega Quarkus, apunta a LLM externo
  local: true

  # Configuración GPU (solo aplica si local: true)
  gpu:
    image: registry.redhat.io/rhaiis/vllm-cuda-rhel9:3.3.0
    model: hf://RedHatAI/Qwen3-8B-FP8-dynamic
    memoryUtilization: "0.70"
    maxModelLen: "4096"
    maxNumSeqs: "4"
    memoryLimit: 14Gi
    memoryRequest: 12Gi

  # Configuración embeddings CPU (solo aplica si local: true)
  embed:
    image: registry.redhat.io/rhaiis/vllm-cpu-rhel9:3.3.0
    model: hf://RedHatAI/nomic-embed-text-v1.5
    cpuLimit: "4"
    cpuRequest: "2"
    memoryLimit: 4Gi
    memoryRequest: 2Gi

  # Configuración LLM externo (solo aplica si local: false)
  external:
    baseUrl: ""       # ej: https://api.anthropic.com/v1
    apiKey: ""        # NUNCA poner aquí — usar --set o secret separado
    modelName: ""     # ej: claude-sonnet-4-6

# ---------------------------------------------------------------
# HuggingFace token (necesario si llm.local: true)
# ---------------------------------------------------------------
huggingface:
  token: ""           # NUNCA poner aquí — usar --set o secret separado

# ---------------------------------------------------------------
# Red Hat KCS API token (completamente opcional)
# Si no se configura, el agente usa modo fallback (URL de búsqueda)
# ---------------------------------------------------------------
kcs:
  offlineToken: ""    # NUNCA poner aquí — usar --set o secret separado

# ---------------------------------------------------------------
# App Quarkus
# ---------------------------------------------------------------
app:
  image: image-registry.openshift-image-registry.svc:5000/kafka-diag-agent/kafka-diag-agent:latest
  replicas: 1
  port: 8080
  buildConfig:
    enabled: true
    gitRepo: https://github.com/emunozd/kafka-diag-agent
    gitRef: main
    contextDir: quarkus

# ---------------------------------------------------------------
# Storage
# ---------------------------------------------------------------
storage:
  storageClass: crc-csi-hostpath-provisioner
  pdfSize: 5Gi
  vectorStoreSize: 2Gi

# ---------------------------------------------------------------
# ChromaDB
# ---------------------------------------------------------------
chromadb:
  image: chromadb/chroma:latest
  memoryLimit: 1Gi
  memoryRequest: 512Mi
  cpuLimit: "1"
  cpuRequest: "500m"
