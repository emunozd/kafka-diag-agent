apiVersion: v1
kind: ServiceAccount
metadata:
  name: kafka-diag-sa
  namespace: {{ .Values.namespace }}
---
# Grant anyuid SCC to kafka-diag-sa so ChromaDB can write to PVCs.
# Equivalent to: oc adm policy add-scc-to-user anyuid -z kafka-diag-sa
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kafka-diag-sa-anyuid
  labels:
    app.kubernetes.io/managed-by: Helm
  annotations:
    meta.helm.sh/release-name: {{ .Release.Name }}
    meta.helm.sh/release-namespace: {{ .Release.Namespace }}
subjects:
  - kind: ServiceAccount
    name: kafka-diag-sa
    namespace: {{ .Values.namespace }}
roleRef:
  kind: ClusterRole
  name: system:openshift:scc:anyuid
  apiGroup: rbac.authorization.k8s.io