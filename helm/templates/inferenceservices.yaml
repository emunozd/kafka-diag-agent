{{- if .Values.llm.local }}
apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: qwen3-8b-llm
  namespace: {{ .Values.namespace }}
  labels:
    opendatahub.io/dashboard: "true"
  annotations:
    serving.kserve.io/deploymentMode: RawDeployment
spec:
  predictor:
    model:
      modelFormat:
        name: vLLM
      runtime: vllm-runtime-llm
      storageUri: {{ .Values.llm.gpu.model }}
      resources:
        limits:
          nvidia.com/gpu: "1"
          memory: {{ .Values.llm.gpu.memoryLimit }}
        requests:
          nvidia.com/gpu: "1"
          memory: {{ .Values.llm.gpu.memoryRequest }}
    env:
      - name: HF_TOKEN
        valueFrom:
          secretKeyRef:
            name: huggingface-secret
            key: HF_TOKEN
---
apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: nomic-embed
  namespace: {{ .Values.namespace }}
  labels:
    opendatahub.io/dashboard: "true"
  annotations:
    serving.kserve.io/deploymentMode: RawDeployment
spec:
  predictor:
    model:
      modelFormat:
        name: vLLM
      runtime: vllm-runtime-embed
      storageUri: {{ .Values.llm.embed.model }}
      resources:
        limits:
          cpu: {{ .Values.llm.embed.cpuLimit | quote }}
          memory: {{ .Values.llm.embed.memoryLimit }}
        requests:
          cpu: {{ .Values.llm.embed.cpuRequest | quote }}
          memory: {{ .Values.llm.embed.memoryRequest }}
    env:
      - name: HF_TOKEN
        valueFrom:
          secretKeyRef:
            name: huggingface-secret
            key: HF_TOKEN
---
# Service adicional para embeddings — KServe crea headless en puerto 80
# que no funciona, necesitamos uno normal en 8000
apiVersion: v1
kind: Service
metadata:
  name: nomic-embed-svc
  namespace: {{ .Values.namespace }}
spec:
  selector:
    serving.kserve.io/inferenceservice: nomic-embed
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP
{{- end }}
