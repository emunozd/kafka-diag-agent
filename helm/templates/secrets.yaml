{{- if .Values.huggingface.token }}
# HuggingFace token — required for model downloads when llm.local is true
apiVersion: v1
kind: Secret
metadata:
  name: huggingface-secret
  namespace: {{ .Values.namespace }}
stringData:
  HF_TOKEN: {{ .Values.huggingface.token | quote }}
{{- end }}
---
{{- if .Values.kcs.offlineToken }}
# Red Hat Customer Portal offline token — optional, enables KCS search
apiVersion: v1
kind: Secret
metadata:
  name: rh-api-credentials
  namespace: {{ .Values.namespace }}
stringData:
  RH_OFFLINE_TOKEN: {{ .Values.kcs.offlineToken | quote }}
{{- end }}
---
{{- if not .Values.llm.local }}
{{- if .Values.llm.external.apiKey }}
# External LLM credentials — only created when llm.local is false
apiVersion: v1
kind: Secret
metadata:
  name: llm-config
  namespace: {{ .Values.namespace }}
stringData:
  LLM_BASE_URL: {{ .Values.llm.external.baseUrl | quote }}
  LLM_API_KEY: {{ .Values.llm.external.apiKey | quote }}
  LLM_MODEL_NAME: {{ .Values.llm.external.modelName | quote }}
{{- end }}
{{- end }}
